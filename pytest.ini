[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    unit: unit tests
    integration: integration tests
    system: system tests
    slow: slow tests
    requires_db: requires database connection
    requires_model: requires model loading
filterwarnings =
    ignore::DeprecationWarning:swigvarlink
    ignore::DeprecationWarning:swig
    ignore::pytest.PytestReturnNotNoneWarning
