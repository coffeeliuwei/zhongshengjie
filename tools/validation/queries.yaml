collections:
  case_library_v2:
    description: 场景案例库
    queries:
      - "主角被逼到绝境后孤注一掷逆转反击"
      - "师父为保护弟子甘愿牺牲自己"
      - "多年宿敌在最终决战前的对峙"
      - "主角初次踏入修炼之路时的懵懂与觉醒"

  writing_techniques_v2:
    description: 写作技法库
    queries:
      - "如何用细节描写制造战斗场景的紧迫感"
      - "伏笔设置与回收的叙事技巧"
      - "通过环境烘托人物内心情绪的写法"
      - "反转情节的铺垫节奏控制"

  dialogue_style_v1:
    description: 对话风格库
    queries:
      - "强者对挑衅者的冷漠回应"
      - "师徒之间传授功法时的对话"
      - "好友久别重逢后的互损调侃"
      - "反派在胜券在握时的独白"

  power_cost_v1:
    description: 力量代价库
    queries:
      - "使用禁术后身体遭受反噬的描写"
      - "透支生命力换取短暂爆发的场景"
      - "连续大战后精力耗尽的状态描写"
      - "代价与收益权衡时的心理挣扎"

  emotion_arc_v1:
    description: 情感弧线库
    queries:
      - "从绝望到重燃斗志的情绪转变过程"
      - "复仇欲望在压抑中逐渐膨胀"
      - "失去至亲后的悲痛与麻木"
      - "蜕变前夕的迷茫与自我怀疑"

  power_vocabulary_v1:
    description: 力量词汇库
    queries:
      - "修仙境界突破时的爆发描述词汇"
      - "魔法系统施法过程的专有表达"
      - "气劲外放时的视觉化描写词汇"
      - "异能能力效果的修辞表达"

  character_relation_v1:
    description: 人物关系图谱库
    queries:
      - "主角与宿敌之间亦敌亦友的复杂关系"
      - "师徒传承中的情感羁绊与权力转移"
      - "同门师兄弟间的竞争与嫉妒"
      - "青梅竹马在成长后的情感错位"

  author_style_v1:
    description: 作者风格库
    queries:
      - "宏大世界观下的史诗叙事风格"
      - "热血战斗配合系统升级的爽文节奏"
      - "细腻情感描写与慢热人物成长"
      - "悬疑伏笔密布的阴谋论风格"

  foreshadow_pair_v1:
    description: 伏笔回收对库
    queries:
      - "开篇埋下的神秘身世在结尾揭晓"
      - "早期提及的微小细节成为关键转折点"
      - "反派动机的前期暗示与后期揭示"
      - "道具或技能的首次出现与最终用途"

  worldview_element_v1:
    description: 世界观元素库
    queries:
      - "宗门体系的等级划分与权力结构"
      - "异世界货币与交易体系的设定"
      - "天地法则对修炼上限的约束机制"
      - "各大势力的领地边界与历史恩怨"
