        function initNodes() {

                    ...e,
                    x: width / 2 + Math.cos(angle) * radius,
                    y: height / 2 + Math.sin(angle) * radius,
                    vx: 0,
                    vy: 0,
                    radius: 14
                };
            });
        }
        
        function renderEntityList() {
            const list = document.getElementById('entityList');
            const filtered = entities.filter(e => {

                if (searchQuery && !e.name.includes(searchQuery)) return false;
                return true;
            });
            
            list.innerHTML = filtered.map(e => `

        function selectEntity(id) {

                showDetail(node);
                renderEntityList();
            }

            // 属性
            let attrsHtml = '';
            if (node.attrs) {
                for (const [k, v] of Object.entries(node.attrs)) {

                        let displayVal = v;
                        if (Array.isArray(v)) {
                            displayVal = v.join(', ');
                        } else if (typeof v === 'object') {
                            displayVal = JSON.stringify(v, null, 2);

                }

            // 关系 - 按类型分组统计

                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentType = btn.dataset.type;
                    renderEntityList();
                });
            });
            
            canvas.addEventListener('mousedown', onMouseDown);
            canvas.addEventListener('mousemove', onMouseMove);
            canvas.addEventListener('mouseup', onMouseUp);
            canvas.addEventListener('wheel', onWheel);
            
            // ESC键取消选中
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && selectedNode) {
                    closeDetail();
                }
            });
            
            window.addEventListener('resize', () => {
                resize();
                initNodes();
            });
        }
        
        function onMouseDown(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left - offsetX) / scale;
            const y = (e.clientY - rect.top - offsetY) / scale;
            
            for (const node of nodes) {
                const dx = x - node.x;
                const dy = y - node.y;
                if (dx * dx + dy * dy < node.radius * node.radius) {
                    // ★ 如果点击的是已选中的节点，开始拖动节点
                    if (selectedNode && selectedNode.id === node.id) {
                        isDraggingNode = true;
                        canvas.style.cursor = 'grabbing';
                    } else {
                        // 否则选中该节点
                        selectEntity(node.id);
                    }
                    return;
                }
            }
            
            // 点击空白区域开始拖动画布（不取消选中）
            isDragging = true;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            canvas.style.cursor = 'grabbing';
        }
        
        function onMouseMove(e) {
            if (isDraggingNode && selectedNode) {
                // ★ 拖动节点
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX - rect.left - offsetX) / scale;
                const y = (e.clientY - rect.top - offsetY) / scale;
                selectedNode.x = x;
                selectedNode.y = y;
            } else if (isDragging) {
                // 拖动画布
                offsetX += e.clientX - lastMouseX;
                offsetY += e.clientY - lastMouseY;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
            } else {
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX - rect.left - offsetX) / scale;
                const y = (e.clientY - rect.top - offsetY) / scale;
                
                hoveredNode = null;
                for (const node of nodes) {
                    const dx = x - node.x;
                    const dy = y - node.y;
                    if (dx * dx + dy * dy < node.radius * node.radius) {
                        hoveredNode = node;
                        canvas.style.cursor = 'pointer';
                        break;
                    }
                }
                if (!hoveredNode) {
                    canvas.style.cursor = 'grab';
                }
            }
        }
        
        function onMouseUp() {
            isDragging = false;
            isDraggingNode = false;
            canvas.style.cursor = 'grab';
        }
        
        function onWheel(e) {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            scale *= delta;
            scale = Math.max(0.3, Math.min(3, scale));
        }
        
        function animate() {
            update();
            draw();
            requestAnimationFrame(animate);
        }
        
        function update() {
            const centerX = width / 2;
            const centerY = height / 2;
            
            nodes.forEach(node => {
                // ★ 正在拖动的节点不受力影响
                if (isDraggingNode && selectedNode && node.id === selectedNode.id) {
                    return;
                }
                
                node.vx += (centerX - node.x) * 0.0001;
                node.vy += (centerY - node.y) * 0.0001;
                
                nodes.forEach(other => {
                    if (node.id !== other.id) {
                        const dx = node.x - other.x;
                        const dy = node.y - other.y;
                        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                        if (dist < 100) {
                            const force = (100 - dist) * 0.01;
                            node.vx += dx / dist * force;
                            node.vy += dy / dist * force;
                        }
                    }
                });
                
                node.x += node.vx;
                node.y += node.vy;
                node.vx *= 0.9;
                node.vy *= 0.9;
            });
        }
        
        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);
            
            // ★ 找出选中节点的相关节点和关系
            const relatedNodeIds = new Set();
            const relatedRelations = [];
            
            if (selectedNode) {
                relations.forEach(r => {
                    if (r.source === selectedNode.id || r.target === selectedNode.id) {
                        relatedRelations.push(r);
                        relatedNodeIds.add(r.source);
                        relatedNodeIds.add(r.target);
                    }
                });
            }
            
            // 绘制关系线
            relations.forEach(r => {
                const source = nodes.find(n => n.id === r.source);
                const target = nodes.find(n => n.id === r.target);
                if (!source || !target) return;
                
                // ★ 判断是否是相关关系
                const isRelated = selectedNode && relatedNodeIds.has(r.source) && relatedNodeIds.has(r.target);
                
                ctx.beginPath();
                ctx.moveTo(source.x, source.y);
                ctx.lineTo(target.x, target.y);
                
                if (isRelated) {
                    // 高亮相关关系线
                    ctx.strokeStyle = r.color;
                    ctx.lineWidth = 3;
                    ctx.globalAlpha = 1;
                } else {
                    // 其他关系线变淡
                    ctx.strokeStyle = r.color;
                    ctx.lineWidth = 1;
                    ctx.globalAlpha = selectedNode ? 0.15 : 0.5;
                }
                ctx.stroke();
                ctx.globalAlpha = 1;
            });
            
            // 绘制节点
            nodes.forEach(node => {
                const isSelected = selectedNode && selectedNode.id === node.id;
                const isHovered = hoveredNode && hoveredNode.id === node.id;
                const isRelated = selectedNode && relatedNodeIds.has(node.id);
                
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                
                if (isSelected) {
                    // 选中的节点最亮
                    ctx.fillStyle = node.color;
                    ctx.globalAlpha = 1;
                } else if (isRelated) {
                    // 相关节点高亮
                    ctx.fillStyle = node.color;
                    ctx.globalAlpha = 1;
                } else if (selectedNode) {
                    // 其他节点变淡
                    ctx.fillStyle = node.color;
                    ctx.globalAlpha = 0.2;
                } else {
                    // 没有选中时正常显示
                    ctx.fillStyle = node.color + 'cc';
                    ctx.globalAlpha = 1;
                }
                ctx.fill();
                ctx.globalAlpha = 1;
                
                if (isSelected || isHovered) {
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                } else if (isRelated) {
                    ctx.strokeStyle = node.color;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
                
                // 节点名称
                ctx.font = '12px Microsoft YaHei';
                if (isSelected || isRelated || !selectedNode) {
                    ctx.fillStyle = '#c9d1d9';
                    ctx.globalAlpha = 1;
                } else {
                    ctx.fillStyle = '#8b949e';
                    ctx.globalAlpha = 0.3;
                }
                ctx.textAlign = 'center';
                ctx.fillText(node.name, node.x, node.y + node.radius + 14);
                ctx.globalAlpha = 1;
            });
            
            ctx.restore();
        }
        
        init();
    </script>
</body>
</html>
